<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Weather App</title>
    <link rel="stylesheet" href="style.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@100;200;300;400;500;600;700;800;900&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div class="container">
      <nav class="nav-bar">
        <div class="logo">
          <i class="fa-solid fa-cloud-sun"></i>
          <h2>Weather Now</h2>
        </div>

        <select id="temperature-unit">
          <option value="c">°C</option>
          <option value="f">°F</option>
        </select>
      </nav>

      <section class="hero">
        <h1>How's the sky looking today?</h1>

        <form id="search-form" class="search-bar">
          <input
            type="text"
            placeholder="Search for a city..."
            id="city-input"
          />

          <button type="submit" id="search-btn">Search</button>
        </form>
      </section>

      <!-- Dashboard -->
      <section class="dashboard">
        <section class="left-panel">
          <!-- current weather -->
          <div class="current-weather">
            <div class="current-left-panel">
              <div class="weather-header">
                <div id="weather-icon">
                  <i class="fa-solid fa-cloud-sun"></i>
                </div>
              </div>

              <div class="weather-body">
                <h2 id="weather-condition">Cloudy</h2>

                <p id="location">Pune, Maharashtra</p>

                <p id="date">Saturday, 5 July</p>
              </div>

              <div class="weather-footer">
                <span id="high-temp">H : 34°C</span>

                <span id="low-temp">L : 27°C</span>
              </div>
            </div>
            <div class="current-right-panel">
              <h1 id="temperature">32°C</h1>
            </div>
          </div>
          <!-- weather details -->
          <div class="weather-details">
            <div class="weather-details-div">
              <i class="fa-solid fa-temperature-half"></i>
              <p>Feels Like</p>
              <h3 id="feels-like">18°C</h3>
            </div>
            <div class="weather-details-div">
              <i class="fa-solid fa-droplet"></i>
              <p>Humidity</p>
              <h3 id="humidity">46%</h3>
            </div>
            <div class="weather-details-div">
              <i class="fa-solid fa-wind"></i>
              <p>Wind</p>
              <h3 id="wind-speed">18 km/h</h3>
            </div>
            <div class="weather-details-div">
              <i class="fa-solid fa-cloud-rain"></i>
              <p>Precipitation</p>
              <h3 id="precipitation">0 mm</h3>
            </div>
          </div>
          <!-- Daily forecast -->
          <div class="daily-forecast">
            <div class="daily-forecast-header">
              <h3>Daily Forecast</h3>
            </div>
            <div id="daily-forecast-body"></div>
          </div>
        </section>
        <!-- Hourly forecast -->
        <aside class="hourly-forecast">
          <h3>Hourly Forecast</h3>

          <div id="hourly-container"></div>
        </aside>
      </section>
    </div>
    <script src="script.js"></script>
  </body>
</html>
